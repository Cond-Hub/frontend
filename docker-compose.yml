name: condhub-frontend

services:
    frontend:
      container_name: condhub-frontend
      image: condhub-frontend
      build:
        context: .
        dockerfile: Dockerfile
        args:
          NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-/api}
      env_file:
        - .env
      environment:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3002}
      ports:
        - "3002:3002"
      extra_hosts:
        - "host.docker.internal:host-gateway"
      restart: unless-stopped
