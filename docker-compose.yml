services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000}
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - ../shared:/shared
      - frontend_node_modules:/app/node_modules
    command: >
      /bin/sh -c "${FRONTEND_COMMAND:-npm run dev -- --hostname 0.0.0.0 --port 3000}"

volumes:
  frontend_node_modules:
