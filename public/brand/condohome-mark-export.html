<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CondoHome Mark Export</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: transparent;
      }

      body {
        display: grid;
        place-items: center;
      }

      .frame {
        width: 512px;
        height: 512px;
        display: grid;
        place-items: center;
        background: transparent;
      }

      img {
        width: 320px;
        height: 320px;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <img src="./condohome-mark.svg" alt="CondoHome mark" />
    </div>
  </body>
</html>
