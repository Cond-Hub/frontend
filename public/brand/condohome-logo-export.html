<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CondoHome Logo Export</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #ffffff;
      }

      body {
        display: grid;
        place-items: center;
      }

      .frame {
        width: 1200px;
        height: 360px;
        display: grid;
        place-items: center;
        background: #ffffff;
      }

      img {
        width: 920px;
        height: auto;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <img src="./condohome-logo.svg" alt="CondoHome logo" />
    </div>
  </body>
</html>
